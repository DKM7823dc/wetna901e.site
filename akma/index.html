        @keyframes breathe {

            <button onclick="closeLightbox()"
                    class="absolute -top-3 -right-3 z-10 w-8 h-8 bg-luxury-gold text-black rounded-full flex items-center justify-center shadow-lg hover:bg-yellow-400 transition-all duration-200">
                <i class="fas fa-times text-sm font-bold"></i>
            </button>
            <img id="lightboxImg" src="" alt="Review enlarged"
                 class="w-full max-h-screen object-contain rounded-xl shadow-2xl border border-luxury-gold/20 block">
        </div>
        <p class="absolute bottom-4 left-1/2 transform -translate-x-1/2 text-gray-500 text-xs">Tap outside to close</p>
    </div>

    <!-- Floating WhatsApp Button -->
    <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-40">
        <a href="javascript:void(0)" 
           onclick="k2()"
           class="breathe bg-green-500 hover:bg-green-600 text-white px-4 py-3 rounded-full shadow-2xl transition-all duration-300 flex items-center space-x-2 whitespace-nowrap">
            <i class="fab fa-whatsapp text-lg"></i>
            <span class="text-xs md:text-sm font-medium">
                For more styles, click here!
            </span>
        </a>
    </div>

    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            if (event.matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });

        // Carousel
        let currentSlide = 0;
        const totalSlides = 5;
        const carouselTrack = document.getElementById('carouselTrack');
        const indicators = document.querySelectorAll('.indicator');

        function updateCarousel() {
            carouselTrack.style.transform = `translateX(-${currentSlide * 100}%)`;
            indicators.forEach((indicator, index) => {
                if (index === currentSlide) {
                    indicator.classList.remove('bg-gray-600');
                    indicator.classList.add('bg-luxury-gold');
                } else {
                    indicator.classList.remove('bg-luxury-gold');
                    indicator.classList.add('bg-gray-600');
                }
            });
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % totalSlides;
            updateCarousel();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            updateCarousel();
        }

        function goToSlide(index) {
            currentSlide = index;
            updateCarousel();
        }

        setInterval(nextSlide, 4000);

        let startX = 0, endX = 0;
        carouselTrack.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; });
        carouselTrack.addEventListener('touchend', (e) => {
            endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) nextSlide();
            else if (endX - startX > 50) prevSlide();
        });

        document.querySelectorAll('img').forEach(img => {
            img.addEventListener('dragstart', (e) => e.preventDefault());
        });

        // Lightbox
        function openLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
